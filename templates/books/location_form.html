{% extends 'base.html' %}
{% block title %}Редактировать персонажа{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3>Редактировать персонажа</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label>Имя</label>
                        <input type="text" name="name" class="form-control" value="{{ character.name }}">
                    </div>
                    <div class="mb-3">
                        <label>Описание</label>
                        <textarea name="context_description" rows="4" class="form-control">{{ character.context_description }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a href="{% url 'book_detail' character.book.id %}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
