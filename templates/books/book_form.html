{% extends 'base.html' %}
{% block title %}Новая книга{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-transparent">
                <h3><i class="bi bi-pencil-square"></i> Добавить книгу</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="title" class="form-label">Название</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label for="content" class="form-label">Текст книги</label>
                        <textarea class="form-control" id="content" name="content" rows="12" required placeholder="Вставьте сюда текст книги..."></textarea>
                        <div class="form-text">Поддерживается до ~15 000 символов для анализа.</div>
                    </div>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a href="{% url 'book_list' %}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
